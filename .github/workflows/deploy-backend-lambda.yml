name: Deploy Backend Lambda Image

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: hono-backend-lambda
  IMAGE_TAG: sha-${{ github.sha }}

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # esbuild は TypeScript の型アノテーションを削除するだけで型チェックは行わない。
      # 型エラーがあっても esbuild のビルドは成功してしまうため、
      # ビルド前に tsc --noEmit で型チェックのみ実行する。
      # --noEmit: 型チェックだけ行い JavaScript ファイルは出力しない（出力は esbuild に任せる）。
      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # -t (--tag): ビルドしたイメージに名前:タグを付与する
          # ECR リポジトリが immutable 設定のため、既存タグの上書きはできない
          # そのためコミット SHA ごとにユニークなタグのみ付与する
          docker build \
            -f docker/ecr/lambda/backend/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

on:
  workflow_dispatch:

env:
  AWS_ROLE_ARN: ${{ secrets.AWS_S3_DEPLOY_ROLE_ARN }}
  AWS_REGION: ap-northeast-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      #  AWS 認証 (OIDC ロール)
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

                  # ▼▼▼ 追加: SSMから最新のIDを取得して環境変数に入れる ▼▼▼
      - name: Get Network Configuration from SSM
        run: |
          BUCKET_NAME=$(aws ssm get-parameter --name "/kum/stg/frontend_bucket_name" --query "Parameter.Value" --output text)
          DISTRIBUTION_ID=$(aws ssm get-parameter --name "/kum/stg/cloudfront_distribution_id" --query "Parameter.Value" --output text)
          
          echo "BUCKET_NAME=$BUCKET_NAME" >> $GITHUB_ENV
          echo "DISTRIBUTION_ID=$DISTRIBUTION_ID" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies and Build
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync ./frontend/dist s3://${{ env.BUCKET_NAME }} --delete
      
      # ▼▼▼ S3配置後にCloudFrontのキャッシュを削除 ▼▼▼
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.DISTRIBUTION_ID }} \
            --paths "/*"
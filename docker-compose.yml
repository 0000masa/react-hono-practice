services:
  hono:
    container_name: hono
    build:
      context: .
      dockerfile: ./docker/local/node/Dockerfile
    image: hono-app
    ports:
      - "3000:3000"
    volumes:
      - "./backend:/app"
    working_dir: /app
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        npm ci
        npx drizzle-kit push
        npm run dev
    networks:
      - backend

  mysql:
    container_name: mysql
    image: "mysql/mysql-server:8.0"
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: database
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      TZ: "Asia/Tokyo"
    volumes:
      - "mysql_data:/var/lib/mysql"
    networks:
      - backend

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p password"]
      retries: 3
      timeout: 5s

  # テスト用 MySQL (Integration / E2E テスト専用)
  # 本番用 DB と同じイメージだが、別ポート (3307) + 揮発ボリュームでデータ汚染を防ぐ
  mysql-test:
    container_name: mysql-test
    image: "mysql/mysql-server:8.0"
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: app_test
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      TZ: "Asia/Tokyo"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p password"]
      retries: 5
      timeout: 5s

  mailpit:
    image: "axllent/mailpit:latest"
    ports:
      - "1025:1025"
      - "8025:8025"
    volumes:
      - mailpit_data:/data
    environment:
      MP_MAX_MESSAGES: "1000"
      MP_DATA_FILE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    networks:
      - backend

  react:
    container_name: react
    build:
      context: .
      dockerfile: ./docker/local/node/Dockerfile
    image: react-app
    ports:
      - "5173:5173"
    volumes:
      - "./frontend:/app"
    working_dir: /app
    command:
      - /bin/bash
      - -c
      - |
        npm ci
        npm run dev -- --host --port 5173
    networks:
      - backend

  # S3 互換のオブジェクトストレージを提供するためのツール
  minio:
    image: minio/minio:RELEASE.2023-01-06T18-11-18Z
    command: ["server", "/data", "--console-address", ":9090"] # コンテナが起動したときに実行するコマンド
    ports:
      - "9000:9000"
      - "9090:9090"
    volumes:
      - "minio_data:/data"
    environment:
      MINIO_ROOT_USER: minio_root
      MINIO_ROOT_PASSWORD: minio_password
    networks:
      - backend

volumes:
  mysql_data:
    driver: local
  mailpit_data:
    driver: local
  minio_data:
    driver: local

networks:
  backend:
    driver: bridge
